<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>VB Latency Monitor</title>
        <script
            src="https://cdn.plot.ly/plotly-2.24.1.min.js"
            charset="UTF-8"
        ></script>
        <style>
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                margin: 20px;
                background-color: #f8f9fa;
                color: #333;
            }
            .container {
                max-width: 1200px;
                margin: 0 auto;
            }
            h1 {
                text-align: center;
                margin-bottom: 30px;
            }
            #loading {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 1.2rem;
                color: #666;
            }

            /* Tab Navigation Styles */
            .tabs {
                display: flex;
                border-bottom: 2px solid #dee2e6;
                margin-bottom: 20px;
            }
            .tab-button {
                padding: 10px 20px;
                font-size: 1rem;
                font-weight: 600;
                background: none;
                border: none;
                cursor: pointer;
                color: #6c757d;
                border-bottom: 3px solid transparent;
                margin-bottom: -2px;
                transition: all 0.2s ease;
            }
            .tab-button:hover {
                color: #495057;
            }
            .tab-button.active {
                color: #007bff;
                border-bottom-color: #007bff;
            }

            /* Tab Content Styles */
            .tab-content {
                display: none;
                background-color: white;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
                border-radius: 8px;
                padding: 20px;
            }
            .tab-content.active {
                display: block;
            }

            /* View Elements */
            #chart {
                width: 100%;
                height: 65vh;
            }
            .table-container {
                overflow-x: auto;
                max-height: 70vh;
                overflow-y: auto;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                text-align: left;
            }
            th,
            td {
                padding: 12px;
                border-bottom: 1px solid #dee2e6;
                font-size: 0.9rem;
            }
            th {
                background-color: #f1f3f5;
                position: sticky;
                top: -20px; /* Aligns sticky header with container padding */
                z-index: 10;
            }
            tbody tr:hover {
                background-color: #f8f9fa;
            }

            /* Alert Styling for Row with non-empty msg */
            tr.has-msg {
                color: #dc3545;
                font-weight: 500;
                background-color: #fff5f5;
            }
            tr.has-msg:hover {
                background-color: #ffe3e3;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>VB Connection Latency</h1>

            <div id="loading">Fetching and processing data...</div>

            <div id="dashboard" style="display: none">
                <div class="tabs">
                    <button
                        class="tab-button active"
                        onclick="switchTab('chart-view')"
                    >
                        Chart View
                    </button>
                    <button
                        class="tab-button"
                        onclick="switchTab('table-view')"
                    >
                        Table View
                    </button>
                </div>

                <div id="chart-view" class="tab-content active">
                    <div id="chart"></div>
                </div>

                <div id="table-view" class="tab-content">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Timestamp</th>
                                    <th>HTTP Latency (s)</th>
                                    <th>WebSocket Latency (s)</th>
                                    <th>Message</th>
                                </tr>
                            </thead>
                            <tbody id="data-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const dataUrl =
                "https://raw.githubusercontent.com/datadavev/vbmon/refs/heads/main/data/log.ndjson";
            let chartRendered = false; // Flag to handle Plotly resize edge cases when initialized hidden
            let chartData = {
                timestamps: [],
                httpLatencies: [],
                wsLatencies: [],
            };

            // Simple Tab Switching Logic
            function switchTab(tabId) {
                // Update active button state
                document.querySelectorAll(".tab-button").forEach((btn) => {
                    btn.classList.remove("active");
                });
                event.currentTarget.classList.add("active");

                // Toggle views
                document.querySelectorAll(".tab-content").forEach((content) => {
                    content.classList.remove("active");
                });
                document.getElementById(tabId).classList.add("active");

                // Plotly requires a resize/redraw call if it was rendered or updated while hidden
                if (tabId === "chart-view" && chartRendered) {
                    Plotly.Plots.resize(document.getElementById("chart"));
                }
            }

            async function initDashboard() {
                try {
                    const response = await fetch(dataUrl);
                    if (!response.ok)
                        throw new Error(
                            `HTTP error! status: ${response.status}`,
                        );

                    const textData = await response.text();
                    const lines = textData.split("\n");

                    const parsedRecords = [];
                    lines.forEach((line) => {
                        if (line.trim() === "") return;
                        try {
                            const parsedObj = JSON.parse(line);
                            if (parsedObj.tstamp) {
                                parsedRecords.push({
                                    tstamp: parsedObj.tstamp,
                                    http:
                                        parsedObj.http_latency !== undefined
                                            ? parsedObj.http_latency
                                            : null,
                                    ws:
                                        parsedObj.ws_latency !== undefined
                                            ? parsedObj.ws_latency
                                            : null,
                                    msg:
                                        parsedObj.msg !== undefined
                                            ? parsedObj.msg
                                            : "",
                                });
                            }
                        } catch (e) {
                            console.warn("Skipping malformed JSON line", e);
                        }
                    });

                    // Sort chronologically for the chart layout
                    parsedRecords.sort(
                        (a, b) => new Date(a.tstamp) - new Date(b.tstamp),
                    );

                    // Populate global chart arrays
                    chartData.timestamps = parsedRecords.map((d) => d.tstamp);
                    chartData.httpLatencies = parsedRecords.map((d) => d.http);
                    chartData.wsLatencies = parsedRecords.map((d) => d.ws);

                    // Populate Table (Reverse order: Most recent at the top)
                    const tableBody =
                        document.getElementById("data-table-body");
                    const tableRowsHtml = parsedRecords
                        .map((record) => {
                            const formattedHttp =
                                record.http !== null ? record.http : "-";
                            const formattedWs =
                                record.ws !== null ? record.ws : "-";

                            // Check if 'msg' is present and not empty string
                            const hasMessage =
                                record.msg &&
                                record.msg.toString().trim() !== "";
                            const rowClass = hasMessage
                                ? 'class="has-msg"'
                                : "";

                            return `
                        <tr ${rowClass}>
                            <td>${record.tstamp}</td>
                            <td>${formattedHttp}</td>
                            <td>${formattedWs}</td>
                            <td>${record.msg}</td>
                        </tr>
                    `;
                        })
                        .reverse()
                        .join("");

                    tableBody.innerHTML = tableRowsHtml;

                    // Reveal Dashboard UI
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("dashboard").style.display =
                        "block";

                    // Render Chart
                    renderChart();
                } catch (error) {
                    console.error("Dashboard error:", error);
                    document.getElementById("loading").innerText =
                        `Error loading dashboard: ${error.message}`;
                }
            }

            function renderChart() {
                const httpTrace = {
                    x: chartData.timestamps,
                    y: chartData.httpLatencies,
                    mode: "lines",
                    name: "HTTP Latency",
                    line: { color: "#1f77b4", width: 2 },
                    connectgaps: true,
                };

                const wsTrace = {
                    x: chartData.timestamps,
                    y: chartData.wsLatencies,
                    mode: "lines",
                    name: "WebSocket Latency",
                    line: { color: "#ff7f0e", width: 2 },
                    connectgaps: true,
                };

                const layout = {
                    title: "HTTP vs WebSocket Latency Over Time",
                    xaxis: {
                        title: "Timestamp",
                        type: "date",
                        autorange: true,
                        rangeslider: { visible: true },
                        rangeselector: {
                            buttons: [
                                {
                                    count: 1,
                                    label: "1 Day",
                                    step: "day",
                                    stepmode: "backward",
                                },
                                {
                                    count: 7,
                                    label: "1 Week",
                                    step: "day",
                                    stepmode: "backward",
                                },
                                {
                                    step: "all",
                                    label: "All",
                                },
                            ],
                            // Styling tweaks for the buttons
                            buttontheme: {
                                fill: "#f1f3f5",
                                stroke: "#dee2e6",
                                "stroke-width": 1,
                                r: 4,
                                style: {
                                    color: "#495057",
                                    fontWeight: "600",
                                    fontSize: "11px",
                                },
                                states: {
                                    active: {
                                        fill: "#007bff",
                                        style: { color: "#ffffff" },
                                    },
                                },
                            },
                            x: 0,
                            y: 1.1, // Places the filter buttons neatly above the chart plot area
                        },
                    },
                    yaxis: {
                        title: "Latency (s)",
                        autorange: true,
                        fixedrange: false,
                    },
                    hovermode: "x unified",
                    margin: { t: 50, r: 30, l: 60, b: 50 },
                };

                const config = { responsive: true };

                Plotly.newPlot("chart", [httpTrace, wsTrace], layout, config);
                chartRendered = true;
            }

            // Initialize on load
            initDashboard();
        </script>
    </body>
</html>
